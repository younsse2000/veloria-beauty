<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOORIA PARFUM | LUXURY EXPERIENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sauvage-glow: #0047ff;
            --stronger-glow: #ff6a00;
            --libre-glow: #ffcc00;
            --goodgirl-glow: #6a00ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* زر الرجوع المطور */
        .back-to-home {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .back-to-home:hover { background: #fff; color: #000; transform: translateX(-5px); }

        /* قسم المعلومات المرتب */
        .order-hub {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 100px 8%;
            background: linear-gradient(to bottom, #050505, #000);
        }

        /* الجانب الأيمن: تفاصيل العطر */
        .scent-specs {
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 40px;
        }

        .scent-badge {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .scent-badge img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--accent);
        }

        .title-group h2 {
            font-family: 'Cinzel';
            margin: 0;
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        .size-selector {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .size-option {
            flex: 1;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }

        .size-option.active {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
            box-shadow: inset 0 0 15px var(--accent);
        }

        .ml-tag { font-size: 1.5rem; font-weight: 700; display: block; }
        .sprays-count { font-size: 0.7rem; color: #888; margin-top: 5px; }

        /* الجانب الأيسر: الاستمارة */
        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 15px 0;
            color: #fff;
            font-family: 'Montserrat';
            transition: 0.3s;
        }

        .input-group input:focus { border-bottom-color: var(--accent); outline: none; }

        .order-btn {
            background: #fff;
            color: #000;
            padding: 25px;
            font-family: 'Cinzel';
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.4s;
        }

        .order-btn:hover {
            letter-spacing: 5px;
            background: var(--accent);
            color: #fff;
        }

        @media (max-width: 992px) {
            .order-hub { grid-template-columns: 1fr; }
            .scent-specs { border-right: none; padding-right: 0; border-bottom: 1px solid #222; padding-bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="back-to-home" id="backBtn" style="display: none;" onclick="closeUniverse()">
        <span>←</span> Back to Collection
    </div>

    <section id="sauvage" class="scent-universe" style="--accent: var(--sauvage-glow); display: block;">
        
        <div class="order-hub">
            
            <div class="scent-specs">
                <div class="scent-badge">
                    <img src="assets/sauvage-icon.jpg" alt="Sauvage">
                    <div class="title-group">
                        <h2>SAUVAGE ELIXIR</h2>
                        <p style="color: #666; font-size: 0.8rem;">DIOR | ELIXIR CONCENTRATION</p>
                    </div>
                </div>

                <p style="color: #bbb; line-height: 1.6;">A masterpiece of wild freshness. Intoxicates the senses with a custom-made heart of spices and a rich woody trail.</p>

                <div class="size-selector">
                    <div class="size-option" onclick="updateOrder('5ML', '± 80 SPRAYS', '170 DH')">
                        <span class="ml-tag">5ML</span>
                        <span class="sprays-count">± 80 SPRAYS</span>
                    </div>
                    <div class="size-option active" onclick="updateOrder('10ML', '± 160 SPRAYS', '319 DH')">
                        <span class="ml-tag">10ML</span>
                        <span class="sprays-count">± 160 SPRAYS</span>
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <span style="font-size: 0.8rem; color: #555;">CURRENT TOTAL:</span>
                    <h1 id="priceDisplay" style="margin: 0; font-family: 'Cinzel'; color: var(--accent);">319 DH</h1>
                </div>
            </div>

            <div class="checkout-form">
                <div class="input-group">
                    <input type="text" id="custName" placeholder="FULL NAME">
                </div>
                <div class="input-group">
                    <input type="tel" id="custPhone" placeholder="PHONE NUMBER">
                </div>
                <div class="input-group">
                    <input type="text" id="custCity" placeholder="CITY">
                </div>
                <div class="input-group">
                    <textarea id="custNote" placeholder="NOTES (OPTIONAL)"></textarea>
                </div>
                <button class="order-btn" onclick="submitTelegram()">ORDER NOW | <span id="btnPrice">319 DH</span></button>
            </div>
        </div>
    </section>

    <script>
        let selectedSize = "10ML";
        let selectedPrice = "319 DH";

        function updateOrder(size, sprays, price) {
            // تحديث الاختيارات البصرية
            document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // تحديث البيانات
            selectedSize = size;
            selectedPrice = price;
            document.getElementById('priceDisplay').innerText = price;
            document.getElementById('btnPrice').innerText = price;
        }

        function closeUniverse() {
            // كود الرجوع للصفحة الرئيسية
            window.location.href = "#collection";
        }
    </script>
</body>
</html>
